<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteriler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="topnav-brand">← Ana Sayfa</a>
    <div class="topnav-links">
      <a href="customers.html">Müşteriler</a>
      <a href="invoices.html">Faturalar</a>
    </div>
    <button id="logout-btn" class="topnav-logout">Çıkış Yap</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Müşteriler</h1>
      <button id="new-customer-btn">+ Yeni Müşteri</button>
    </div>

    <input type="text" id="search-input" class="search-box" placeholder="Müşteri ara...">

    <div id="customer-list" class="customer-list">
      <p class="empty-state">Yükleniyor...</p>
    </div>

    <div id="customer-form-overlay" class="overlay hidden">
      <form id="customer-form" class="customer-form">
        <h2 id="form-title">Yeni Müşteri</h2>

        <fieldset>
          <legend>Temel Bilgiler</legend>
          <label>Tür
            <select id="customer_type">
              <option value="tuzel">Tüzel Kişi</option>
              <option value="gercek">Gerçek Kişi</option>
            </select>
          </label>
          <label>Firma Unvanı *
            <input type="text" id="company_title" required>
          </label>
          <label>Kısa İsim
            <input type="text" id="short_name">
          </label>
          <label>VKN / TCKN
            <input type="text" id="tax_id">
          </label>
          <label>Vergi Dairesi
            <input type="text" id="tax_office">
          </label>
          <label>Kategori
            <input type="text" id="category">
          </label>
        </fieldset>

        <fieldset>
          <legend>İletişim</legend>
          <label>E-posta Adresi
            <input type="email" id="email">
          </label>
          <label>Telefon Numarası
            <input type="text" id="phone">
          </label>
          <label>Faks Numarası
            <input type="text" id="fax">
          </label>
        </fieldset>

        <fieldset>
          <legend>Adres</legend>
          <label>Açık Adres
            <textarea id="address"></textarea>
          </label>
          <label>Posta Kodu
            <input type="text" id="postal_code">
          </label>
          <label>İlçe
            <input type="text" id="district">
          </label>
          <label>İl
            <input type="text" id="city">
          </label>
        </fieldset>

        <fieldset>
          <legend>Finansal</legend>
          <label>IBAN Numarası
            <input type="text" id="iban">
          </label>
          <label>Fiyat Listesi
            <input type="text" id="price_list">
          </label>
          <label>Döviz
            <select id="currency">
              <option value="TRY">TRY</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
          <label>Açılış Bakiyesi
            <input type="number" step="0.01" id="opening_balance">
          </label>
        </fieldset>

        <fieldset>
          <legend>Yetkili Kişi</legend>
          <label>Adı
            <input type="text" id="contact_name">
          </label>
          <label>E-posta
            <input type="email" id="contact_email">
          </label>
          <label>Telefon
            <input type="text" id="contact_phone">
          </label>
        </fieldset>

        <label>Notlar
          <textarea id="notes"></textarea>
        </label>

        <p id="form-error" class="error"></p>

        <div class="form-actions">
          <button type="button" id="cancel-btn" class="secondary">Vazgeç</button>
          <button type="submit">Kaydet</button>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script src="customers.js"></script>
</body>
</html>
