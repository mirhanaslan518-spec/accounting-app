<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Sayfa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-wrapper">
    <main class="card">
      <header class="header">
        <p class="eyebrow">GİRİŞ</p>
        <h1>Hesabınıza Giriş Yapın</h1>
        <p class="subtitle">Devam etmek için e-posta ve şifrenizi girin.</p>
      </header>

      <section id="login-section">
        <form id="login-form">
          <label for="email">E-posta</label>
          <input type="email" id="email" required autocomplete="username">
          <label for="password">Şifre</label>
          <input type="password" id="password" required autocomplete="current-password">
          <button type="submit">Giriş Yap</button>
          <p id="login-error" class="error"></p>
        </form>
      </section>
    </main>
  </div>

  <div id="app-section" class="hidden">
    <nav class="topnav">
      <span class="topnav-brand">Ana Sayfa</span>
      <div class="topnav-links">
        <a href="customers.html">Müşteriler</a>
        <a href="invoices.html">Faturalar</a>
      </div>
      <button id="logout-btn" class="topnav-logout">Çıkış Yap</button>
    </nav>
    <main class="container">
      <dl class="status-grid">
        <dt>Giriş yapan</dt><dd id="user-email">—</dd>
        <dt>Şirket</dt><dd id="company-name">—</dd>
      </dl>
      <p class="hint">Soldaki menüden Müşteriler veya Faturalar sayfasına gidebilirsiniz.</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script src="app.js"></script>
</body>
</html>
