<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teklifler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="topnav-brand">← Ana Sayfa</a>
    <div class="topnav-links">
      <a href="quotes.html">Teklifler</a>
      <a href="invoices.html">Faturalar</a>
      <a href="customers.html">Müşteriler</a>
      <a href="products.html">Ürünler</a>
      <a href="expenses.html">Giderler</a>
      <a href="suppliers.html">Tedarikçiler</a>
      <a href="employees.html">Çalışanlar</a>
      <a href="accounts.html">Kasa/Banka</a>
      <a href="reports.html">Raporlar</a>
      <a href="settings.html">Ayarlar</a>
    </div>
    <button id="logout-btn" class="topnav-logout">Çıkış Yap</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Teklifler</h1>
      <button id="new-quote-btn">+ Yeni Teklif</button>
    </div>

    <div class="filter-bar">
      <button type="button" class="filter-btn active" data-filter="all">Tümü</button>
      <button type="button" class="filter-btn" data-filter="beklemede">Bekleyen</button>
      <button type="button" class="filter-btn" data-filter="kabul_edildi">Onaylanan</button>
      <button type="button" class="filter-btn" data-filter="reddedildi">Reddedilen</button>
    </div>

    <div id="quote-list" class="customer-list">
      <p class="empty-state">Yükleniyor...</p>
    </div>

    <!-- Powers the autocomplete on each line item's description field. -->
    <datalist id="product-options"></datalist>

    <div id="quote-form-overlay" class="overlay hidden">
      <form id="quote-form" class="customer-form">
        <h2 id="quote-form-title">Yeni Teklif</h2>

        <fieldset>
          <legend>Teklif Bilgileri</legend>
          <label>Teklif İsmi
            <input type="text" id="quote_name">
          </label>
          <label>Müşteri *
            <select id="customer_id" required></select>
          </label>
          <label>Düzenleme Tarihi
            <input type="date" id="issue_date" required>
          </label>
          <label>Geçerlilik Tarihi
            <input type="date" id="valid_until">
          </label>
          <div class="due-date-presets">
            <button type="button" class="preset-btn" data-days="7">7 Gün</button>
            <button type="button" class="preset-btn" data-days="14">14 Gün</button>
            <button type="button" class="preset-btn" data-days="30">30 Gün</button>
            <button type="button" class="preset-btn" data-days="60">60 Gün</button>
          </div>
          <label>Döviz
            <select id="currency">
              <option value="TRY">TRY</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Kalemler</legend>
          <div id="line-items"></div>
          <button type="button" id="add-line-btn" class="secondary">+ Yeni Satır Ekle</button>
        </fieldset>

        <div class="totals-box">
          <div><span>Ara Toplam</span><strong id="totals-subtotal">0.00</strong></div>
          <div><span>Toplam KDV</span><strong id="totals-tax">0.00</strong></div>
          <div class="totals-grand"><span>Genel Toplam</span><strong id="totals-grand">0.00</strong></div>
        </div>

        <label>Teklif Koşulları
          <textarea id="terms"></textarea>
        </label>
        <label>Notlar
          <textarea id="notes"></textarea>
        </label>

        <p id="quote-form-error" class="error"></p>

        <div class="form-actions">
          <button type="button" id="quote-cancel-btn" class="secondary">Vazgeç</button>
          <button type="submit">Kaydet</button>
        </div>
      </form>
    </div>
  </main>

 <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { jsPDF } from 'https://cdn.jsdelivr.net/npm/jspdf@2/+esm';
    import { autoTable } from 'https://cdn.jsdelivr.net/npm/jspdf-autotable@5/+esm';
    window.supabase = { createClient };
    window.jsPDF = jsPDF;
    window.pdfAutoTable = autoTable;
  </script>
  <script src="shared.js" defer></script>
  <script src="pdf.js" defer></script>
  <script src="quotes.js" defer></script>
</body>
</html>
