name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 6 */3 * *'   # runs every 3 days at 06:00 UTC
  workflow_dispatch:          # lets you also trigger it manually from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -s -o /dev/null -w "Supabase responded with HTTP %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/companies?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
