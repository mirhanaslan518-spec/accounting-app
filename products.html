<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürünler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="topnav-brand">← Ana Sayfa</a>
    <div class="topnav-links">
      <a href="quotes.html">Teklifler</a>
      <a href="invoices.html">Faturalar</a>
      <a href="customers.html">Müşteriler</a>
      <a href="products.html">Ürünler</a>
      <a href="accounts.html">Kasa/Banka</a>
    </div>
    <button id="logout-btn" class="topnav-logout">Çıkış Yap</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Hizmet ve Ürünler</h1>
      <button id="new-product-btn">+ Yeni Ürün</button>
    </div>

    <input type="text" id="search-input" class="search-box" placeholder="Ürün ara...">

    <div id="product-list" class="customer-list">
      <p class="empty-state">Yükleniyor...</p>
    </div>

    <div id="product-form-overlay" class="overlay hidden">
      <form id="product-form" class="customer-form">
        <h2 id="product-form-title">Yeni Ürün</h2>

        <label>Hizmet / Ürün Adı *
          <input type="text" id="name" required>
        </label>
        <label>Birim
          <input type="text" id="unit" value="adet">
        </label>
        <label>Satış Fiyatı
          <input type="number" step="0.01" id="unit_price" value="0">
        </label>
        <label>KDV %
          <input type="number" step="0.01" id="tax_rate" value="18">
        </label>

        <p id="product-form-error" class="error"></p>

        <div class="form-actions">
          <button type="button" id="product-cancel-btn" class="secondary">Vazgeç</button>
          <button type="submit">Kaydet</button>
        </div>
      </form>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    window.supabase = { createClient };
  </script>
  <script src="shared.js" defer></script>
  <script src="products.js" defer></script>
</body>
</html>
