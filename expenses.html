<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giderler</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="topnav-brand">← Ana Sayfa</a>
    <div class="topnav-links">
      <a href="quotes.html">Teklifler</a>
      <a href="invoices.html">Faturalar</a>
      <a href="customers.html">Müşteriler</a>
      <a href="products.html">Ürünler</a>
      <a href="expenses.html">Giderler</a>
      <a href="suppliers.html">Tedarikçiler</a>
      <a href="employees.html">Çalışanlar</a>
      <a href="accounts.html">Kasa/Banka</a>
    </div>
    <button id="logout-btn" class="topnav-logout">Çıkış Yap</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Giderler</h1>
      <div class="header-actions">
        <button id="new-quick-btn">+ Hızlı Fiş/Fatura</button>
        <button id="new-detailed-btn">+ Detaylı Fiş/Fatura</button>
      </div>
    </div>

    <div class="filter-bar">
      <button type="button" class="filter-btn active" data-filter="all">Tümü</button>
      <button type="button" class="filter-btn" data-filter="odenecek">Ödenecek</button>
      <button type="button" class="filter-btn" data-filter="odendi">Ödendi</button>
    </div>

    <div id="expense-list" class="customer-list">
      <p class="empty-state">Yükleniyor...</p>
    </div>

    <!-- Powers the autocomplete on each line item's description field
         (unit + KDV autofill only — price stays manual, see note in JS). -->
    <datalist id="product-options"></datalist>

    <div id="expense-form-overlay" class="overlay hidden">
      <form id="expense-form" class="customer-form">
        <h2 id="expense-form-title">Yeni Gider</h2>

        <fieldset>
          <legend>Gider Bilgileri</legend>
          <label>Kayıt İsmi
            <input type="text" id="expense_name">
          </label>
          <label>Tedarikçi
            <select id="supplier_id"></select>
          </label>
          <label>Fiş/Fatura Tarihi
            <input type="date" id="receipt_date" required>
          </label>
          <label>Fiş/Fatura Numarası
            <input type="text" id="receipt_number">
          </label>
          <label>Döviz
            <select id="currency">
              <option value="TRY">TRY</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
          <label>Ödeme Durumu
            <select id="payment_status">
              <option value="odenecek">Ödenecek</option>
              <option value="odendi">Ödendi</option>
            </select>
          </label>
          <label>Ödeneceği Tarih
            <input type="date" id="due_date">
          </label>
        </fieldset>

        <!-- Shown only for Hızlı Fiş/Fatura -->
        <fieldset id="manual-totals-group">
          <legend>Tutar</legend>
          <label>Tutar (KDV Hariç)
            <input type="number" step="0.01" id="manual_total" value="0">
          </label>
          <label>KDV
            <input type="number" step="0.01" id="manual_tax" value="0">
          </label>
        </fieldset>

        <!-- Shown only for Detaylı Fiş/Fatura -->
        <fieldset id="lines-group">
          <legend>Kalemler</legend>
          <div id="line-items"></div>
          <button type="button" id="add-line-btn" class="secondary">+ Yeni Satır Ekle</button>
        </fieldset>

        <div class="totals-box" id="computed-totals-box">
          <div><span>Ara Toplam</span><strong id="totals-subtotal">0.00</strong></div>
          <div><span>Toplam KDV</span><strong id="totals-tax">0.00</strong></div>
          <div class="totals-grand"><span>Genel Toplam</span><strong id="totals-grand">0.00</strong></div>
        </div>

        <label>Notlar
          <textarea id="notes"></textarea>
        </label>

        <p id="expense-form-error" class="error"></p>

        <div class="form-actions">
          <button type="button" id="expense-cancel-btn" class="secondary">Vazgeç</button>
          <button type="submit">Kaydet</button>
        </div>
      </form>
    </div>

    <!-- Small modal shown when marking a gider as paid — asks which
         account it was paid from and on what date. -->
    <div id="pay-modal-overlay" class="overlay hidden">
      <form id="pay-form" class="customer-form">
        <h2>Ödendi Olarak İşaretle</h2>

        <label>Ödeme Tarihi
          <input type="date" id="pay_date" required>
        </label>
        <label>Hesap *
          <select id="pay_account_id" required></select>
        </label>

        <p id="pay-form-error" class="error"></p>

        <div class="form-actions">
          <button type="button" id="pay-cancel-btn" class="secondary">Vazgeç</button>
          <button type="submit">Onayla</button>
        </div>
      </form>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    window.supabase = { createClient };
  </script>
  <script src="shared.js" defer></script>
  <script src="expenses.js" defer></script>
</body>
</html>
