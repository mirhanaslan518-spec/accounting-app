<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şifre Sıfırla</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-wrapper">
    <main class="card">
      <header class="header">
        <p class="eyebrow">ŞİFRE SIFIRLA</p>
        <h1>Yeni Şifre Belirleyin</h1>
        <p class="subtitle">E-postanızdaki bağlantı üzerinden buraya ulaştınız.</p>
      </header>

      <form id="reset-form">
        <label for="new-password">Yeni Şifre</label>
        <input type="password" id="new-password" required minlength="8" autocomplete="new-password">
        <label for="confirm-password">Yeni Şifre (Tekrar)</label>
        <input type="password" id="confirm-password" required minlength="8" autocomplete="new-password">
        <button type="submit">Şifreyi Güncelle</button>
        <p id="reset-error" class="error"></p>
        <p id="reset-success" class="success"></p>
      </form>
    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    window.supabase = { createClient };
  </script>
  <script src="shared.js" defer></script>
  <script src="reset-password.js" defer></script>
</body>
</html>
